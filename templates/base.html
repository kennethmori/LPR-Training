<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}USM License Plate Recognition System{% endblock %}">
    <title>{% block title %}{{ app_title }}{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/img/usm-seal.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    >
    <link rel="stylesheet" href="/static/css/base.css?v={{ server_time }}">
    <link rel="stylesheet" href="/static/css/style.css?v={{ server_time }}">
    {% block head %}{% endblock %}
</head>
<body class="dashboard-page {% block body_class %}{% endblock %}">
    <a class="skip-link" href="#mainContent">Skip to main content</a>
    {% block page %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
